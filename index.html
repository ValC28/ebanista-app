<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ebanista">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Ebanista — Production</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* ─── Reset & Variables ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #F2F2F7;
      --card:     #FFFFFF;
      --primary:  #1C1C1E;
      --accent:   #8B6914;
      --accent2:  #C5972A;
      --green:    #34C759;
      --red:      #FF3B30;
      --orange:   #FF9500;
      --blue:     #007AFF;
      --gray:     #8E8E93;
      --gray2:    #E5E5EA;
      --gray3:    #F2F2F7;
      --text:     #1C1C1E;
      --text2:    #3C3C43;
      --text3:    #8E8E93;
      --radius:   14px;
      --shadow:   0 2px 8px rgba(0,0,0,.08);
      --shadow2:  0 4px 20px rgba(0,0,0,.12);
      --font:     -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: var(--font); color: var(--text); -webkit-tap-highlight-color: transparent; }

    /* ─── Layout ────────────────────────────────────────── */
    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
    .nav-bar { background: rgba(255,255,255,.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--gray2); padding: env(safe-area-inset-top, 0) 20px 0; display: flex; align-items: center; justify-content: space-between; min-height: 56px; flex-shrink: 0; z-index: 100; }
    .nav-bar h1 { font-size: 17px; font-weight: 600; color: var(--text); }
    .nav-back { color: var(--blue); font-size: 16px; font-weight: 400; background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 8px 0; }
    .nav-back::before { content: '‹'; font-size: 22px; line-height: 1; }
    .nav-action { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 7px 14px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .nav-action.secondary { background: var(--gray3); color: var(--blue); }

    .screen { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 16px 16px calc(env(safe-area-inset-bottom, 0) + 16px); }

    /* ─── Dashboard ────────────────────────────────────── */
    .dashboard-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .dashboard-title { font-size: 28px; font-weight: 700; }
    .btn-new { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 10px 18px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
    .btn-new::before { content: '+'; font-size: 20px; font-weight: 400; }

    .search-bar { background: var(--gray2); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
    .search-bar input { background: none; border: none; outline: none; flex: 1; font-size: 16px; color: var(--text); }
    .search-bar::before { content: '⌕'; font-size: 18px; color: var(--gray); }

    .section-label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; padding-left: 4px; }

    .project-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; box-shadow: var(--shadow); cursor: pointer; display: flex; align-items: center; gap: 12px; transition: transform .1s; }
    .project-card:active { transform: scale(.98); }
    .project-icon { width: 46px; height: 46px; border-radius: 10px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .project-info { flex: 1; min-width: 0; }
    .project-info h3 { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .project-info p { font-size: 13px; color: var(--text3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .project-status { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
    .status-badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
    .status-0 { background: #E5E5EA; color: #8E8E93; }
    .status-1 { background: #FFF3D0; color: #8B6914; }
    .status-2 { background: #D1F0D9; color: #1A7F3C; }
    .status-3 { background: #FFE5D0; color: #C1440E; }
    .chevron { color: var(--gray); font-size: 18px; }

    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state .icon { font-size: 56px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .empty-state p { font-size: 15px; color: var(--text3); }

    /* ─── Project View ──────────────────────────────────── */
    .tab-bar { display: flex; background: var(--card); border-bottom: 1px solid var(--gray2); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex-shrink: 0; }
    .tab-bar::-webkit-scrollbar { display: none; }
    .tab { padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--text3); white-space: nowrap; border-bottom: 2px solid transparent; cursor: pointer; transition: all .2s; flex-shrink: 0; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

    /* ─── Form Styles ───────────────────────────────────── */
    .form-section { background: var(--card); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; box-shadow: var(--shadow); }
    .form-section-title { font-size: 13px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; padding: 14px 16px 0; }
    .form-row { padding: 12px 16px; border-bottom: 1px solid var(--gray2); display: flex; align-items: center; gap: 12px; }
    .form-row:last-child { border-bottom: none; }
    .form-label { font-size: 15px; color: var(--text2); flex-shrink: 0; min-width: 120px; }
    .form-label.wide { min-width: 160px; }
    .form-input { flex: 1; border: none; outline: none; font-size: 15px; color: var(--text); background: none; text-align: right; font-family: var(--font); }
    .form-input::placeholder { color: var(--text3); }
    .form-input.full { text-align: left; }
    textarea.form-input { resize: none; min-height: 80px; padding: 4px 0; text-align: left; }
    select.form-input { text-align: right; appearance: none; -webkit-appearance: none; }

    .checkbox-row { padding: 12px 16px; border-bottom: 1px solid var(--gray2); display: flex; align-items: center; gap: 12px; cursor: pointer; width: 100%; background: none; border-left: none; border-right: none; border-top: none; text-align: left; font-family: var(--font); font-size: inherit; -webkit-appearance: none; touch-action: manipulation; }
    .checkbox-row:last-child { border-bottom: none; }
    .checkbox-row:active { background: var(--gray3); }
    .checkbox { width: 24px; height: 24px; border-radius: 6px; border: 2px solid var(--gray2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
    .checkbox.checked { background: var(--green); border-color: var(--green); }
    .checkbox.checked::after { content: '✓'; color: white; font-size: 14px; font-weight: 700; }
    .checkbox-label { font-size: 15px; color: var(--text); flex: 1; line-height: 1.4; }
    .checkbox-label.checked { color: var(--text3); text-decoration: line-through; }

    /* ─── Photo Capture ─────────────────────────────────── */
    .photo-section { padding: 16px; }
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .photo-thumb { aspect-ratio: 1; border-radius: 8px; overflow: hidden; position: relative; background: var(--gray2); }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .photo-thumb .del { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,.6); color: white; border: none; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .photo-thumb .photo-label { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,.5); color: white; font-size: 10px; padding: 3px 4px; text-align: center; }
    .photo-actions { display: flex; gap: 10px; }
    .btn-photo { flex: 1; background: var(--blue); color: white; border: none; border-radius: 10px; padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-photo.secondary { background: var(--gray2); color: var(--text); }
    input[type="file"] { display: none; }

    /* ─── Status Steps ──────────────────────────────────── */
    .steps-container { padding: 16px; }
    .step { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
    .step-num { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--gray2); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--text3); flex-shrink: 0; transition: all .2s; cursor: pointer; }
    .step-num.done { background: var(--green); border-color: var(--green); color: white; }
    .step-num.done::after { content: '✓'; }
    .step-num.done span { display: none; }
    .step-num.active { border-color: var(--accent); color: var(--accent); }
    .step-line { width: 2px; background: var(--gray2); flex: 1; margin: 4px 0 4px 14px; min-height: 20px; }
    .step-line.done { background: var(--green); }
    .step-content { flex: 1; padding-top: 5px; }
    .step-title { font-size: 15px; font-weight: 500; }
    .step-title.done { color: var(--text3); text-decoration: line-through; }

    /* ─── Signature ─────────────────────────────────────── */
    .signature-area { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); margin-bottom: 16px; }
    .signature-title { font-size: 15px; font-weight: 600; padding: 14px 16px; border-bottom: 1px solid var(--gray2); }
    .sig-row { display: flex; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--gray2); }
    .sig-row:last-child { border-bottom: none; }
    .sig-field { flex: 1; }
    .sig-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
    .sig-input { border: none; border-bottom: 1px solid var(--gray2); outline: none; font-size: 15px; width: 100%; padding: 4px 0; background: none; font-family: var(--font); }
    .sig-canvas { border: 1px dashed var(--gray2); border-radius: 8px; width: 100%; height: 80px; cursor: crosshair; touch-action: none; background: var(--gray3); }
    .sig-canvas.signed { border-color: var(--green); background: #f0fdf4; }
    .sig-clear { background: none; border: none; color: var(--red); font-size: 13px; cursor: pointer; margin-top: 4px; }

    /* ─── RACI Table ────────────────────────────────────── */
    .raci-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .raci-table th { background: var(--gray3); padding: 8px 10px; font-weight: 600; text-align: left; font-size: 12px; color: var(--text3); }
    .raci-table td { padding: 8px 10px; border-bottom: 1px solid var(--gray2); }
    .raci-table input { border: none; outline: none; background: none; font-size: 13px; width: 100%; font-family: var(--font); }
    .raci-table-wrap { overflow-x: auto; padding: 0 16px 16px; }

    /* ─── Furniture Table ───────────────────────────────── */
    .furniture-list { padding: 0 16px 16px; }
    .furniture-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--gray2); }
    .furniture-item:last-child { border-bottom: none; }
    .furniture-num { width: 28px; height: 28px; border-radius: 6px; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .furniture-input { flex: 1; border: none; outline: none; font-size: 15px; background: none; font-family: var(--font); }
    .furniture-qty { width: 50px; border: none; border-bottom: 1px solid var(--gray2); outline: none; font-size: 14px; text-align: center; background: none; font-family: var(--font); }
    .furniture-check { width: 24px; height: 24px; border-radius: 6px; border: 2px solid var(--gray2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; flex-shrink: 0; }
    .furniture-check.done { background: var(--green); border-color: var(--green); }
    .furniture-check.done::after { content: '✓'; color: white; font-size: 14px; font-weight: 700; }
    .furniture-del { background: none; border: none; color: var(--red); font-size: 20px; cursor: pointer; padding: 0 4px; }
    .btn-add-row { background: none; border: none; color: var(--blue); font-size: 15px; font-weight: 500; cursor: pointer; padding: 10px 0; display: flex; align-items: center; gap: 6px; }
    .btn-add-row::before { content: '+'; font-size: 18px; }

    /* ─── Progress Ring ─────────────────────────────────── */
    .progress-ring { display: flex; align-items: center; justify-content: center; padding: 16px; }
    .progress-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .progress-card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); text-align: center; }
    .progress-card .value { font-size: 28px; font-weight: 700; }
    .progress-card .label { font-size: 12px; color: var(--text3); margin-top: 4px; }
    .progress-bar-wrap { background: var(--gray2); border-radius: 4px; height: 8px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 4px; transition: width .4s; }

    /* ─── Modal ─────────────────────────────────────────── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; display: flex; align-items: flex-end; backdrop-filter: blur(4px); animation: fadeIn .2s; }
    .modal { background: var(--card); border-radius: 20px 20px 0 0; padding: 20px; padding-bottom: calc(env(safe-area-inset-bottom) + 20px); width: 100%; max-height: 90vh; overflow-y: auto; animation: slideUp .25s; }
    .modal-handle { width: 36px; height: 4px; background: var(--gray2); border-radius: 2px; margin: 0 auto 20px; }
    .modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 20px; }

    /* ─── PIN Modal ──────────────────────────────────────── */
    .pin-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 400; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(6px); animation: fadeIn .2s; }
    .pin-modal { background: var(--card); border-radius: 20px; padding: 28px 24px 24px; width: 320px; max-width: 90vw; animation: pinPop .2s; text-align: center; }
    @keyframes pinPop { from { transform: scale(.9); opacity: 0 } to { transform: scale(1); opacity: 1 } }
    .pin-modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .pin-modal p { font-size: 14px; color: var(--text3); margin-bottom: 20px; }
    .pin-dots { display: flex; justify-content: center; gap: 14px; margin-bottom: 16px; }
    .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--gray2); background: transparent; transition: background .15s, border-color .15s; }
    .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
    .pin-dot.error { background: var(--red); border-color: var(--red); }
    .pin-error { font-size: 13px; color: var(--red); margin-bottom: 12px; min-height: 18px; }
    .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .pin-key { background: var(--gray3); border: none; border-radius: 12px; height: 56px; font-size: 22px; font-weight: 500; font-family: var(--font); cursor: pointer; touch-action: manipulation; transition: background .1s; }
    .pin-key:active { background: var(--gray2); }
    .pin-key.del { font-size: 18px; }
    .pin-key.cancel { background: none; font-size: 15px; color: var(--text3); }
    .pin-modal .del-btn { margin-top: 16px; background: var(--red); color: white; border: none; border-radius: 12px; padding: 14px; width: 100%; font-size: 16px; font-weight: 600; font-family: var(--font); cursor: pointer; touch-action: manipulation; }
    .card-del-btn { background: none; border: none; padding: 8px; cursor: pointer; color: var(--gray); touch-action: manipulation; font-size: 18px; flex-shrink: 0; }
    .card-del-btn:active { color: var(--red); }
    @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
    @keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }

    /* ─── Toast ─────────────────────────────────────────── */
    .toast { position: fixed; bottom: calc(env(safe-area-inset-bottom) + 90px); left: 50%; transform: translateX(-50%); background: rgba(30,30,32,.9); color: white; padding: 10px 18px; border-radius: 20px; font-size: 14px; font-weight: 500; z-index: 300; animation: toastIn .3s; backdrop-filter: blur(10px); white-space: nowrap; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px) } to { opacity: 1; transform: translateX(-50%) translateY(0) } }

    /* ─── Bottom Tab Bar ────────────────────────────────── */
    .bottom-tabs { display: flex; background: rgba(255,255,255,.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--gray2); padding-bottom: env(safe-area-inset-bottom); flex-shrink: 0; }
    .bottom-tab { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0 4px; cursor: pointer; color: var(--gray); gap: 2px; transition: color .15s; }
    .bottom-tab.active { color: var(--accent); }
    .bottom-tab .icon { font-size: 22px; }
    .bottom-tab .label { font-size: 10px; font-weight: 500; }

    /* ─── Misc ──────────────────────────────────────────── */
    .divider { height: 1px; background: var(--gray2); margin: 8px 0; }
    .date-badge { font-size: 12px; color: var(--text3); }
    .info-banner { background: #FFF8E1; border-left: 3px solid var(--accent2); padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
    .badge-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

    /* ─── Print ─────────────────────────────────────────── */
    @media print {
      .nav-bar, .tab-bar, .bottom-tabs, .btn-photo, .btn-new, .nav-action, .nav-back { display: none !important; }
      body { background: white; }
      .screen { overflow: visible; }
      .form-section, .signature-area { box-shadow: none; border: 1px solid #ddd; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<!-- Camera input (hidden) -->
<input type="file" id="cameraInput" accept="image/*" capture="environment" multiple>
<input type="file" id="galleryInput" accept="image/*" multiple>

<script>
// ═══════════════════════════════════════════════════════
//  EBANISTA — Production Manager v1.0
// ═══════════════════════════════════════════════════════

const STATUS_LABELS = ['Nouveau', 'En étude', 'En production', 'Terminé'];
const STATUS_COLORS = ['status-0', 'status-1', 'status-2', 'status-3'];

let state = {
  screen: 'dashboard',
  projects: [],
  currentProject: null,
  currentTab: 0,
  search: '',
};

// ── Persistence ──────────────────────────────────────
function save() {
  try { localStorage.setItem('ebanista_v1', JSON.stringify(state.projects)); } catch(e) {}
}
function load() {
  try {
    const d = localStorage.getItem('ebanista_v1');
    if (d) state.projects = JSON.parse(d);
  } catch(e) {}
}

// ── Helpers ───────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmt(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('fr-FR'); }
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast'; el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}
function getProject(id) { return state.projects.find(p => p.id === id); }

// ── Project Factory ───────────────────────────────────
function newProject() {
  return {
    id: uid(),
    createdAt: Date.now(),
    status: 0,
    // ── Identification ──
    identification: {
      codeProjet: 'EBA-',
      nomProjet: '',
      driveFolder: null,
      client: '',
      adresseChantier: '',
      dateOuverture: '',
      dateLivraison: '',
      commercial: '',
      dessinateurBE: '',
      chefAtelier: '',
      responsablePose: '',
      statutAvancement: [false,false,false,false,false,false],
      checklistDoc: [false,false,false,false,false,false,false,false],
      synthese: '',
      validationLancement: '',
      validationPose: '',
      validationDate: '',
    },
    // ── Lancement Production ──
    lancement: {
      raci: [
        { tache:'Plans techniques', verifie:'', valide:'', informe:'', prepare:'' },
        { tache:'Fichiers CNC', verifie:'', valide:'', informe:'', prepare:'' },
        { tache:'Liste quincaillerie', verifie:'', valide:'', informe:'', prepare:'' },
        { tache:'Spécificités chantier', verifie:'', valide:'', informe:'', prepare:'' },
      ],
      dossierTech: [false,false,false,false,false],
      fichiersProd: [false,false,false,false,false,false],
      matieresFourn: [false,false,false,false,false],
      pointsCritiques: [false,false,false,false,false],
      observations: '',
      receptionSemaine: '',
      respBE: '', respBEDate: '',
      respProd: '', respProdDate: '',
    },
    // ── Contrôle Atelier ──
    atelier: {
      dateControle: '',
      meubles: [],
      quincaillerie: [
        { label:'Poignées', done:false },
        { label:'Charnières', done:false },
        { label:'Coulisses', done:false },
        { label:'Visserie spécifique chantier', done:false },
        { label:'Pieds de meubles', done:false },
        { label:'Plinthes', done:false },
        { label:'Accessoires intérieurs', done:false },
        { label:'Éléments spéciaux / sur-mesure', done:false },
      ],
      controleQualite: [
        { label:'Dimensions conformes aux plans', done:false },
        { label:'Aspect visuel / finitions contrôlés', done:false },
        { label:'Assemblages vérifiés', done:false },
        { label:'Éléments complets par meuble', done:false },
        { label:'Protection et emballage réalisés', done:false },

// ─── Dashboard ────────────────────────────────────────
function renderDashboard() {
  const filtered = state.projects.filter(p => {
    const q = state.search.toLowerCase();

              || (p.identification.client||'').toLowerCase().includes(q)
              || (p.identification.adresseChantier||'').toLowerCase().includes(q);

  const byStatus = [0,1,2,3].map(s => filtered.filter(p => p.status === s));

  let html = `
  <div id="app">
    <div class="nav-bar">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px">🪵</div>
        <h1>Ebanista Production</h1>
      </div>
      <button onclick="showPinForDrive()" style="background:none;border:none;cursor:pointer;padding:4px;touch-action:manipulation;opacity:${_driveClientId?'1':'.45'}" title="Google Drive">
        <svg width="22" height="22" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg"><path d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8H0c0 1.55.4 3.1 1.2 4.5z" fill="#0066DA"/><path d="M43.65 25L29.9 1.2C28.55 2 27.4 3.1 26.6 4.5L1.2 48.55C.4 49.95 0 51.5 0 53.05h27.5z" fill="#00AC47"/><path d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5H59.8l7.75 20.8z" fill="#EA4335"/><path d="M43.65 25L57.4 1.2C56.05.4 54.5 0 52.9 0H34.4c-1.6 0-3.15.45-4.5 1.2z" fill="#00832D"/><path d="M59.8 53.05H27.5L13.75 76.85c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684FC"/><path d="M73.4 26.5l-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3L43.65 25l16.15 28.05H87.3c0-1.55-.4-3.1-1.2-4.5z" fill="#FFBA00"/></svg>
      </button>
    </div>
    <div class="screen" style="padding-top:16px">
      <div class="dashboard-header">
        <div class="dashboard-title">Projets</div>
        <button class="btn-new" onclick="openNewProject()">Nouveau</button>
      </div>
      <div class="search-bar">
        <input type="search" placeholder="Rechercher…" value="${state.search}"
          oninput="state.search=this.value;renderDebounced()">
      </div>
  `;

  if (filtered.length === 0) {
    html += `<div class="empty-state">
      <div class="icon">🪵</div>
      <h3>${state.search ? 'Aucun résultat' : 'Aucun projet'}</h3>
      <p>${state.search ? 'Modifiez votre recherche' : 'Créez votre premier projet de fabrication'}</p>
    </div>`;
  } else {
    const statusNames = ['Nouveaux', 'En cours', 'En production', 'Livrés'];
    for (let s = 0; s < 4; s++) {
      if (byStatus[s].length === 0) continue;
      html += `<div class="section-label">${statusNames[s]} (${byStatus[s].length})</div>`;
      for (const p of byStatus[s]) {
        const prog = calcProgress(p);
        html += `
        <div class="project-card" onclick="openProject('${p.id}')">
          <div class="project-icon">🪵</div>
          <div class="project-info">
            <h3>${p.identification.codeProjet || 'Sans code'}${p.identification.nomProjet ? ' — ' + p.identification.nomProjet : ''}</h3>
            <p>${p.identification.client || 'Client non renseigné'} · ${p.identification.adresseChantier || '—'}</p>
            <div style="margin-top:6px">
              <div class="progress-bar-wrap">
                <div class="progress-bar" style="width:${prog}%"></div>
              </div>
            </div>
          </div>
          <div class="project-status">
            <span class="status-badge ${STATUS_COLORS[p.status]}">${STATUS_LABELS[p.status]}</span>
            <span class="date-badge">${fmt(p.createdAt)}</span>
          </div>
          <button class="card-del-btn" onclick="event.stopPropagation();showDeleteModal('${p.id}')" title="Supprimer">🗑️</button>
        </div>`;
      }
    }
  }
  html += `</div></div>`;
  return html;
}

let renderTimer;
function renderDebounced() { clearTimeout(renderTimer); renderTimer = setTimeout(render, 150); }

function calcProgress(p) {
  let done = 0, total = 0;
  const addArr = arr => { total += arr.length; done += arr.filter(Boolean).length; };
  const addObj = arr => { total += arr.length; done += arr.filter(x=>x.done).length; };
  addArr(p.identification.statutAvancement);                          // Identification
  addArr([...p.lancement.dossierTech,...p.lancement.fichiersProd,...p.lancement.matieresFourn,...p.lancement.pointsCritiques]); // Lancement
  addObj(p.atelier.controleQualite);                                  // Atelier
  addArr(p.pose.suiviInstallation);                                   // Pose
  return total ? Math.round(done / total * 100) : 0;
}

// ─── Project View ─────────────────────────────────────
const TABS = ['Identification','Lancement Prod.','Contrôle Atelier','Dossier de Pose'];

function renderProject() {
  const p = getProject(state.currentProject);
  if (!p) { state.screen = 'dashboard'; return renderDashboard(); }

  const tabs = TABS.map((t,i) => `<div class="tab${i===state.currentTab?' active':''}" onclick="switchTab(${i})">${t}</div>`).join('');
  let content = '';
  if (state.currentTab === 0) content = renderIdentification(p);
  else if (state.currentTab === 1) content = renderLancement(p);
  else if (state.currentTab === 2) content = renderAtelier(p);
  else if (state.currentTab === 3) content = renderPose(p);

  return `
  <div id="app">
    <div class="nav-bar">
      <button class="nav-back" onclick="goBack()">Projets</button>
      <h1>${p.identification.nomProjet || p.identification.codeProjet || 'Nouveau projet'}</h1>

        <button class="card-del-btn" onclick="showDeleteModal('${p.id}')" title="Supprimer" style="font-size:20px;padding:4px 6px">🗑️</button>

      </div>

    <div class="screen">${content}</div>
  </div>`;
}

let _pinTarget   = null;  // id projet pour suppression
let _pinCallback = null;  // callback déclenché si PIN correct
let _pinEntry    = '';

function _showPinModal(title, subtitle, callback) {
  _pinCallback = callback;
  _pinEntry = '';
  const overlay = document.createElement('div');
  overlay.id = 'pinOverlay';
  overlay.className = 'pin-overlay';
  overlay.innerHTML = `
    <div class="pin-modal" onclick="event.stopPropagation()">
      <h3>${title}</h3>
      <p>${subtitle}</p>
      <div class="pin-dots" id="pinDots">
        <div class="pin-dot" id="pd0"></div>
        <div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div>
        <div class="pin-dot" id="pd3"></div>
      </div>
      <div class="pin-error" id="pinError"></div>
      <div class="pin-pad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" type="button" onclick="pinKey('${n}')">${n}</button>`).join('')}
        <button class="pin-key cancel" type="button" onclick="closePinModal()">Annuler</button>
        <button class="pin-key" type="button" onclick="pinKey('0')">0</button>
        <button class="pin-key del" type="button" onclick="pinDel()">⌫</button>
      </div>
    </div>`;
  overlay.addEventListener('click', closePinModal);
  document.body.appendChild(overlay);
}

function showDeleteModal(projectId) {
  _pinTarget = projectId;
  const p = getProject(projectId);
  const name = p ? (p.identification.codeProjet || 'ce projet') : 'ce projet';
  _showPinModal(
    'Supprimer le projet',
    `Entrez le code à 4 chiffres pour supprimer <strong>${name}</strong>`,
    () => {
      const idToDelete = _pinTarget;
      _pinTarget = null;
      state.projects = state.projects.filter(p => p.id !== idToDelete);
      if (state.screen === 'project' && state.currentProject === idToDelete) {
        state.screen = 'dashboard';
      }
      save();
      render();
      toast('Projet supprimé');
    }
  );
}

function showPinForDrive() {
  _showPinModal(
    '🔒 Accès Drive',
    'Entrez le code à 4 chiffres pour accéder aux paramètres Drive',
    () => showDriveSetup()
  );
}

function closePinModal() {
  const el = document.getElementById('pinOverlay');
  if (el) el.remove();
  _pinTarget   = null;
  _pinCallback = null;
  _pinEntry    = '';
}

function updatePinDots(error) {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('pd' + i);
    if (!dot) continue;
    dot.className = 'pin-dot' + (i < _pinEntry.length ? (error ? ' error' : ' filled') : '');
  }
}

function pinKey(digit) {
  if (_pinEntry.length >= 4) return;
  _pinEntry += digit;
  updatePinDots(false);
  if (_pinEntry.length === 4) {
    if (_pinEntry === '2623') {
      const cb = _pinCallback;
      closePinModal();
      if (cb) cb();
    } else {
      document.getElementById('pinError').textContent = 'Code incorrect';
      updatePinDots(true);
      setTimeout(() => {
        _pinEntry = '';
        updatePinDots(false);
        const err = document.getElementById('pinError');
        if (err) err.textContent = '';
      }, 800);
    }
  }
}

function pinDel() {
  if (_pinEntry.length > 0) {
    _pinEntry = _pinEntry.slice(0, -1);
    updatePinDots(false);
  }
}

// ─── Google Drive Integration ──────────────────────────
let _driveClientId = localStorage.getItem('ebanista_gcid') || '';
let _driveToken = null;
let _driveTokenExpiry = 0;
let _driveClient = null;
let _drivePending = null;

window.addEventListener('load', () => {
  const poll = setInterval(() => {
    if (window.google?.accounts?.oauth2) {
      clearInterval(poll);
      if (_driveClientId) _initDriveClient();
    }
  }, 300);
  setTimeout(() => clearInterval(poll), 15000);
});

function _initDriveClient() {
  try {
    _driveClient = google.accounts.oauth2.initTokenClient({
      client_id: _driveClientId,
      scope: 'https://www.googleapis.com/auth/drive.file',
      hint: 'ebanista.atelier@gmail.com',
      callback(resp) {
        if (resp.error) { toast('Erreur Google Auth'); _drivePending = null; return; }
        _driveToken = resp.access_token;
        _driveTokenExpiry = Date.now() + (resp.expires_in - 60) * 1000;
        const cb = _drivePending; _drivePending = null;
        if (cb) cb();
      }
    });
  } catch(e) { console.error('Drive init error', e); }
}

function _driveAuth(cb) {
  if (!_driveClientId) { showDriveSetup(); return; }
  if (_driveToken && Date.now() < _driveTokenExpiry) { cb(); return; }
  if (!_driveClient) { toast('Google Drive non disponible (vérifiez la connexion)'); return; }
  _drivePending = cb;
  _driveToken = null;
  _driveClient.requestAccessToken({ prompt: '' });
}

async function _driveAPI(method, path, body) {
  const opts = {
    method,
    headers: { 'Authorization': 'Bearer ' + _driveToken }
  };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch('https://www.googleapis.com/drive/v3/' + path, opts);
  if (!r.ok) throw new Error('Drive API ' + r.status);
  return r.json();
}

function createProjectFolder(p) {
  const parts = [p.identification.codeProjet, p.identification.nomProjet]
    .filter(s => s && s !== 'EBA-');
  const name = parts.join(' — ') || ('Projet ' + new Date().toLocaleDateString('fr-FR'));
  _driveAuth(async () => {
    try {
      const f = await _driveAPI('POST', 'files', { name, mimeType: 'application/vnd.google-apps.folder' });
      p.identification.driveFolder = { id: f.id, url: 'https://drive.google.com/drive/folders/' + f.id, name };
      save();
      render();
      toast('📁 Dossier Drive créé');
    } catch(e) { toast('Erreur Drive: ' + e.message); }
  });
}

async function loadDriveFiles(projectId) {
  const p = getProject(projectId);
  if (!p?.identification?.driveFolder) return;
  const box = document.getElementById('driveFiles');
  if (!box) return;
  box.innerHTML = '<span style="color:var(--text3);font-size:13px">Chargement…</span>';
  _driveAuth(async () => {
    try {
      const q = encodeURIComponent(`'${p.identification.driveFolder.id}' in parents and trashed=false`);
      const data = await _driveAPI('GET', `files?q=${q}&fields=files(id,name,mimeType,webViewLink,iconLink,modifiedTime)&orderBy=modifiedTime+desc`);
      const files = data.files || [];
      if (!files.length) {
        box.innerHTML = '<span style="color:var(--text3);font-size:13px">Aucun fichier — ajoutez des plans dans le dossier Drive</span>';
        return;
      }
      box.innerHTML = files.map(f => `
        <a href="${f.webViewLink}" target="_blank" rel="noopener"
           style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray2);text-decoration:none;color:var(--text)">
          <img src="${f.iconLink}" width="20" height="20" style="flex-shrink:0">
          <span style="flex:1;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${f.name}</span>
          <span style="color:var(--blue);font-size:12px;flex-shrink:0">Ouvrir ↗</span>
        </a>`).join('');
    } catch(e) {
      box.innerHTML = '<span style="color:var(--red);font-size:13px">Erreur de chargement</span>';
    }
  });
}

  const folder = p.identification?.driveFolder;

  if (!folder) return `

  return `

        <span style="font-size:26px">📁</span>

        </div>

        <button onclick="loadDriveFiles('${p.id}')" style="background:none;border:none;color:var(--blue);font-size:13px;cursor:pointer;font-family:var(--font);touch-action:manipulation;padding:0">Voir les plans et fichiers →</button>

function showDriveSetup() {
  const existing = document.getElementById('driveSetupOverlay');
  if (existing) { existing.remove(); return; }
  const ov = document.createElement('div');
  ov.id = 'driveSetupOverlay';
  ov.className = 'pin-overlay';
  ov.onclick = () => ov.remove();
  ov.innerHTML = `
    <div class="pin-modal" style="width:360px;max-width:92vw;text-align:left" onclick="event.stopPropagation()">
